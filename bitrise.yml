format_version: "26"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
meta:
  bitrise.io:
    stack: osx-xcode-16.4.x
project_type: react-native
app:
  envs:
    - PROJECT_LOCATION: android
    - MODULE: app
    - VARIANT: debug
    - BITRISE_PROJECT_PATH: ios/rn_chess.xcodeproj
    - BITRISE_SCHEME: rn_chess
    - BITRISE_DISTRIBUTION_METHOD: development
step_bundles:
  setup:
    steps:
      - activate-ssh-key@4:
          run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
      - git-clone@8: {}
      - restore-npm-cache@3: {}
      - yarn@2:
          title: yarn install
          inputs:
            - command: install
workflows:
  primary:
    description: Runs tests on every push to main and on pull requests.
    steps:
      - bundle::setup: {}
      - yarn@2:
          title: yarn test
          inputs:
            - command: test
      - save-npm-cache@1: {}
      - deploy-to-bitrise-io@2: {}
    triggers:
      push:
        - branch: main
      pull_request:
        - source_branch: '*'
  android-build:
    description: Builds a debug APK for Android.
    steps:
      - bundle::setup: {}
      - install-missing-android-tools@3:
          inputs:
            - gradlew_path: $PROJECT_LOCATION/gradlew
      - android-build@1:
          inputs:
            - project_location: $PROJECT_LOCATION
            - module: $MODULE
            - variant: $VARIANT
      - save-npm-cache@1: {}
      - deploy-to-bitrise-io@2: {}
  deploy:
    description: |
      Builds and deploys the app for both iOS (Release) and Android (Release).
      Requires Apple API key and Android code signing to be configured first.
    steps:
      - bundle::setup: {}
      - install-missing-android-tools@3:
          inputs:
            - gradlew_path: $PROJECT_LOCATION/gradlew
      - android-build@1:
          inputs:
            - project_location: $PROJECT_LOCATION
            - module: $MODULE
            - variant: release
      - xcode-archive@6:
          inputs:
            - project_path: $BITRISE_PROJECT_PATH
            - scheme: $BITRISE_SCHEME
            - distribution_method: $BITRISE_DISTRIBUTION_METHOD
            - configuration: Release
            - automatic_code_signing: api-key
      - save-npm-cache@1: {}
      - deploy-to-bitrise-io@2: {}
